name: pdc
services:
  connector:
    container_name: pdc-connector
    image: ptx/connector:1.10.0-slim
    restart: unless-stopped
    volumes:
      - './config.production.json:/usr/src/app/dist/src/config.json.tmp'
      - './.env.production:/usr/src/app/.env.tmp'
    ports:
      - "3333:3000"
    environment:
      # By default
      MONGO_URI: mongodb://mongodb:27017/dataspace-connector
      PDC_ENV: production
    extra_hosts:
      - "gw.ptx-core.sandbox.local:host-gateway"
      - "host.docker.internal:host-gateway"
    networks:
      - local
    depends_on:
      mongodb:
        condition: service_healthy
      catalog:
        condition: service_healthy
    healthcheck:
      test: [ "NONE" ]
  mongodb:
    container_name: pdc-mongodb
    image: ptx/mongodb:8.0.23-slim
    ports:
      - "27018:27017"
    environment:
      MONGO_BIND_IP: 0.0.0.0
      #PDC_DB_NAME: dataspace-connector
      #PDC_DB_USER: pdc
      #PDC_DB_PASSWORD: pdc
    networks:
      - local
    healthcheck:
      test: [ "CMD-SHELL", "curl -sSf http://localhost:27017 || exit 1" ]
      start_period: 30s
      start_interval: 3s
  catalog:
    container_name: ptx-catalog
    image: ptx-sandbox/catalog:1.10.0-slim
    ports:
      - "3002:8082"
    extra_hosts:
      - "gw.ptx-edge.cluster.k3d:host-gateway"
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -O /dev/null http://localhost:8082/__admin/health || exit 1" ]
      start_period: 30s
      start_interval: 3s
networks:
  local:
    external: false