apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${CONTROLLER}
  namespace: ${PTX}
  labels:
    app.kubernetes.io/name: ${CONTROLLER}
    env: ${ENV}
    tier: edge
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ${CONTROLLER}-rbac-cluster
  labels:
    app.kubernetes.io/name: ${CONTROLLER}
    env: ${ENV}
    tier: edge
rules:
  ### Framework: runtime observation of namespaces & CRDs (addition/deletion).
  - apiGroups: [ apiextensions.k8s.io ]
    resources: [ customresourcedefinitions ]
    verbs: [ list, watch ]
  - apiGroups: [ "" ]
    resources: [ namespaces ]
    verbs: [ list, watch ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ${CONTROLLER}-rbac-cluster
  namespace: ${PTX}
  labels:
    app.kubernetes.io/name: ${CONTROLLER}
    env: ${ENV}
    tier: edge
subjects:
  - kind: ServiceAccount
    name: ${CONTROLLER}
    namespace: ${PTX}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ${CONTROLLER}-rbac-cluster
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${CONTROLLER}-rbac
  namespace: ${PTX}
  labels:
    app.kubernetes.io/name: ${CONTROLLER}
    env: ${ENV}
    tier: edge
rules:
  ### Framework: posting the events about the handlers progress/errors.
  - apiGroups: [ "" ]
    resources: [ events ]
    verbs: [ create ]
  ### Application: watching & handling for the custom resource.
  - apiGroups: [ dataspace.ptx.org ]
    resources: [ edgeworkertasks, edgeworkertasks/status ]
    verbs: [ list, watch, patch ]
  ### Application: other resources it produces and manipulates.
  - apiGroups: [ batch ]
    resources: [ jobs ]
    verbs: [ create ]
  - apiGroups: [ apps ]
    resources: [ deployments ]
    verbs: [ create ]
  - apiGroups: [ "" ]
    resources: [ services ]
    verbs: [ create ]
  - apiGroups: [ networking.k8s.io ]
    resources: [ ingress ]
    verbs: [ create ]
  - apiGroups: [ traefik.io ]
    resources: [ middlewares ]
    verbs: [ create ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${CONTROLLER}-rbac
  namespace: ${PTX}
  labels:
    app.kubernetes.io/name: ${CONTROLLER}
    env: ${ENV}
    tier: edge
subjects:
  - kind: ServiceAccount
    name: ${CONTROLLER}
    namespace: ${PTX}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${CONTROLLER}-rbac
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${CONTROLLER}
  namespace: ${PTX}
  labels:
    app.kubernetes.io/name: ${CONTROLLER}
    env: ${ENV}
    tier: edge
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ${CONTROLLER}
      env: ${ENV}
      tier: edge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ${CONTROLLER}
        env: ${ENV}
        tier: edge
    spec:
      serviceAccountName: ${CONTROLLER}
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      containers:
        - name: ${CONTROLLER}
          image: ${REGISTRY}:${REGISTRY_PORT}/${CONTROL_IMG}
          imagePullPolicy: IfNotPresent
          command: [ "kopf", "run", "--standalone",
                     "--namespace=${NS}", "--liveness=http://0.0.0.0:8080/healthz", "app/controller.py" ]
          ports:
            - name: api-port
              containerPort: ${CNTR_PORT}
              protocol: TCP
          livenessProbe:
            httpGet:
              port: ${CNTR_PORT}
              path: /${CNTR_LIVE_PATH}
            initialDelaySeconds: 5
            periodSeconds: 5
      restartPolicy: Always
---