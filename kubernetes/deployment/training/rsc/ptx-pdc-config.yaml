---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ${PDC}-config
  namespace: ${PTX}
  labels:
    app.kubernetes.io/name: ${PDC}
    env: ${ENV}
    tier: ptx
data:
  .env: |
    NODE_ENV=${PDC_ENV}
    PORT=${PDC_PORT}
    #
    SESSION_SECRET=${PDC_SESSION_SECRET}
    SESSION_COOKIE_EXPIRATION=24000
    #
    MONGO_URI=mongodb://localhost:27017/dataspace-connector
    #
    CURATOR=https://tmit.bme.hu
    MAINTAINER=https://tmit.bme.hu
    #
    WINSTON_LOGS_MAX_FILES=14d
    WINSTON_LOGS_MAX_SIZE=20m
    #
    JWT_BEARER_TOKEN_EXPIRATION=3h
    JWT_REFRESH_TOKEN_EXPIRATION=1d
    #
    EXCHANGE_TRIGGER_API_KEY=${PDC_CFG_EXCHANGE_TRIGGER_API_KEY}
    EXCHANGE_TIMEOUT=120
  sandbox-config.json: |
    {
      "endpoint": "http://${PDC_ID}.${PTX}.svc.cluster.local:${PDC_PORT}/",
      "serviceKey": "${PDC_CFG_SERVICE_KEY}",
      "secretKey": "${PDC_CFG_SECRET_KEY}",
      "contractUri": "http://contract.${SANDBOX}.svc.cluster.local:3001/",
      "catalogUri": "http://catalog.${SANDBOX}.svc.cluster.local:3002/v1/",
      "consentUri": "http://consent.${SANDBOX}.svc.cluster.local:3003/v1/",
      "expressLimitSize": "10mb",
      "serviceChainAdapter": false
    }
  visions-config.json: |
    {
      "endpoint": "${PDC_CFG_ENDPOINT}",
      "serviceKey": "${PDC_CFG_SERVICE_KEY}",
      "secretKey": "${PDC_CFG_SECRET_KEY}",
      "contractUri": "${PTX_CONTRACT_URI}",
      "catalogUri": "${PTX_CATALOG_URI}",
      "consentUri": "${PTX_CONSENT_URI}",
      "expressLimitSize": "10mb",
      "serviceChainAdapter": false
    }
  entrypoint.sh: |
    #!/bin/bash -x
    envsubst <dist/src/config.json.tmp >dist/src/config.${PDC_ENV}.json
    envsubst <.env.tmp >.env.${PDC_ENV}
    exec "$@"
immutable: true
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: ${PDC}-secrets-env
  namespace: ${PTX}
  labels:
    app.kubernetes.io/name: ${PDC}
    env: ${ENV}
    tier: ptx
data:
  SERVICE_KEY: ${PDC_SERVICE_KEY_BASE64_ENCODED}
  SECRET_KEY: ${PDC_SECRET_KEY_BASE64_ENCODED}
  EXCHANGE_TRIGGER_API_KEY: ${PDC_EXCHANGE_TRIGGER_API_KEY_BASE64_ENCODED}
immutable: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${PDC}
  namespace: ${PTX}
  labels:
    app.kubernetes.io/name: ${PDC}
    env: ${ENV}
    tier: ptx
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${PDC}-init
  namespace: ${PTX}
  labels:
    app.kubernetes.io/name: ${PDC}
    env: ${ENV}
    tier: ptx
rules:
  - apiGroups: [ "" ]
    resources: [ "pods" ]
    verbs: [ "patch" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${PDC}-init
  namespace: ${PTX}
  labels:
    app.kubernetes.io/name: ${PDC}
    env: ${ENV}
subjects:
  - kind: ServiceAccount
    name: ${PDC}
    namespace: ${PTX}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${PDC}-init
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-lister
  namespace: ${PTX}
  labels:
    env: ${ENV}
    tier: ptx
rules:
  - apiGroups: [ "" ]
    resources: [ "nodes" ]
    verbs: [ "list" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-lister
  namespace: ${PTX}
  labels:
    env: ${ENV}
    tier: ptx
subjects:
  - kind: ServiceAccount
    name: ${PDC}
    namespace: ${PTX}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-lister
---