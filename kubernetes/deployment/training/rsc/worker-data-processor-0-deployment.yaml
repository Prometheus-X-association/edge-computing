---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${DP0}
  namespace: ${PTX}
  labels:
    app.kubernetes.io/name: ${DP0}
    env: ${ENV}
    tier: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ${DP0}
      env: ${ENV}
      tier: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ${DP0}
        env: ${ENV}
        tier: worker
    spec:
      initContainers:
        - name: ${BUILDER}
          image: ${REGISTRY}:${REGISTRY_PORT}/${BUILD_IMG}
          imagePullPolicy: IfNotPresent
          command: [ "python3", "-m", "app", "-v" ]
          volumeMounts:
            - name: data-dir
              mountPath: /var/cache/data
              readOnly: false
            - name: registry-ca
              mountPath: /usr/share/ca-certificates/ptx-edge
              readOnly: true
          env:
            - name: BUILD_CONNECTION_TIMEOUT
              value: "${BUILD_TIMEOUT}"
            - name: BUILD_DATA_SRC
              value: "${DP0_DATA}"
            - name: BUILD_DATA_DST
              value: "/var/cache/data/"
            - name: BUILD_WORKER_SRC
              #value: "docker://${DP0_IMG}"
            #- name: BUILD_WORKER_DST
            #  value: "worker/${DP0}:latest"
      containers:
        - name: worker
          #image: ${REGISTRY}:${REGISTRY_PORT}/worker/${DP0}:latest
          image: ${DP0_IMG}
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 1000m
              memory: 3000Mi
          volumeMounts:
            - name: data-dir
              mountPath: /data
              readOnly: true
          env:
            - name: mlflow_tracking_uri_internal
              value: ${DP0_MLFLOW_INT}
            - name: mlflow_tracking_uri_organizational
              value: ${DP0_MLFLOW_ORG}
          ports:
            - name: port-mlflow
              containerPort: 5000
            - name: port-api
              containerPort: 8000
      schedulerName: ptx-edge-scheduler
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: ${LAB_PZ}/${PZ_DATA_0}
                    operator: In
                    values:
                      - "true"
      volumes:
        - name: data-dir
          emptyDir:
            sizeLimit: 100Mi
        - name: registry-ca
          configMap:
            name: registry-root-ca.crt
            items:
              - key: ca.crt
                path: registry_CA.crt
---
apiVersion: v1
kind: Service
metadata:
  name: ${DP0}
  namespace: ${PTX}
  labels:
    app.kubernetes.io/name: ${DP0}
    env: ${ENV}
    tier: worker
spec:
  selector:
    app.kubernetes.io/name: ${DP0}
    env: ${ENV}
    tier: worker
  type: ClusterIP
  ports:
    - name: port-mlflow
      port: 5000
      targetPort: port-mlflow
    - name: port-api
      port: 8000
      targetPort: port-api
---