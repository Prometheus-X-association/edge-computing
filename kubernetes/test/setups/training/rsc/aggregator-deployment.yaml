---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${AGG}
  namespace: ${PTX}
  labels:
    app.kubernetes.io/name: ${AGG}
    env: ${ENV}
    tier: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ${AGG}
      env: ${ENV}
      tier: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ${AGG}
        env: ${ENV}
        tier: worker
    spec:
      initContainers:
        - name: ${BUILDER}
          image: ${REGISTRY}:${REGISTRY_PORT}/${BUILD_IMG}
          imagePullPolicy: IfNotPresent
          command: [ "python3", "-m", "app", "-v" ]
          volumeMounts:
            - name: registry-ca
              mountPath: /usr/share/ca-certificates/ptx-edge
              readOnly: true
          env:
            - name: BUILD_CONNECTION_TIMEOUT
              value: "${BUILD_TIMEOUT}"
            - name: BUILD_DATA_SRC
              #value: null
            - name: BUILD_DATA_DST
              value: "/var/cache/data/"
            - name: BUILD_WORKER_SRC
              #value: "docker://${AGG_IMG}"
            - name: BUILD_WORKER_DST
              value: "worker/${AGG}:latest"
      containers:
        - name: worker
          #image: ${REGISTRY}:${REGISTRY_PORT}/worker/${AGG}:latest
          image: ${AGG_IMG}
          imagePullPolicy: Always
          #resources:
          #  requests:
          #    cpu: 2850m
          #    memory: 700Mi
          #  limits:
          #    cpu: 3500m
          #    memory: 1Gi
          env:
            - name: mlflow_tracking_uri_internal
              value: http://localhost:5000
            - name: mlflow_tracking_uri_organizational
              value: http://${AGG}.${PTX}.svc.default.local:5000
            - name: mlflow_tracking_uri_external
              value: http://vm.fured.cloud.bme.hu:9860
          ports:
            - name: port-5000
              containerPort: 5000
            - name: port-8000
              containerPort: 8000
      #schedulerName: ptx-edge-scheduler
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: ${LAB_PZ}/${PZ_FED}
                    operator: In
                    values:
                      - "true"
      volumes:
        - name: registry-ca
          configMap:
            name: registry-root-ca.crt
            items:
              - key: ca.crt
                path: registry_CA.crt
---
apiVersion: v1
kind: Service
metadata:
  name: ${AGG}
  namespace: ${PTX}
  labels:
    app.kubernetes.io/name: ${AGG}
    env: ${ENV}
    tier: worker
spec:
  selector:
    app.kubernetes.io/name: ${AGG}
    env: ${ENV}
    tier: worker
  type: ClusterIP
  ports:
    - name: port-5000
      port: 5000
      targetPort: port-5000
    - name: port-8000
      port: 8000
      targetPort: port-8000
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ${AGG}-stripprefix
  namespace: ${PTX}
  labels:
    app.kubernetes.io/name: ${AGG}
    env: ${ENV}
    tier: worker
spec:
  stripPrefix:
    prefixes:
      - /worker/${AGG}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${AGG}
  namespace: ${PTX}
  labels:
    app.kubernetes.io/name: ${AGG}
    env: ${ENV}
    tier: worker
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: ${PTX}-${AGG}-stripprefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: #${LB_DOMAIN}
      http:
        paths:
          - path: /worker/${AGG}
            pathType: Prefix
            backend:
              service:
                name: ${AGG}
                port:
                  number: 5000
---