---
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: ${TRAEFIK}
  namespace: kube-system
spec:
  valuesContent: |-
    additionalArguments:
      - "--global.checknewversion=false"
      - "--global.sendanonymoususage=false"
      - "--log.level=DEBUG"
      - "--accesslog=true"
      - "--providers.kubernetescrd=true"
      - "--providers.kubernetesingress=true"
      #- "--providers.kubernetesgateway=true"
      - "--api=false"
      - "--entrypoints.web.address=:80"
      #- "--entryPoints.web.http.redirections.entrypoint.to=websecure"
      #- "--entryPoints.web.http.redirections.entrypoint.scheme=https"
      #- "--entryPoints.web.http.redirections.entrypoint.priority=42"
      #- "--entryPoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--entrypoints.websecure.http.tls.domains[0].main=${GW_DOMAIN}"
      - "--entrypoints.websecure.http.tls.options=kube-system-tls-opt@kubernetescrd"
      #- "--entrypoints.websecure.http.tls.certresolver=letsencrypt"
      #- "--certificatesresolvers.letsencrypt.acme.email=${GW_TLS_EMAIL}"
      #- "--certificatesresolvers.letsencrypt.acme.storage=/data/acme.json"
      #- "--certificatesresolvers.letsencrypt.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory" #Testing
      #- "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      #- "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      #- "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    extraObjects:
      - apiVersion: traefik.io/v1alpha1
        kind: TLSOption
        metadata:
          name: tls-opt
          namespace: kube-system
        spec:
          minVersion: VersionTLS12
          cipherSuites:
            - TLS_ECDHE_ECDSA_WITH_AES_128_CBC_SHA256
            - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
            - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
            - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
            - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
            - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
            - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
            - TLS_AES_256_GCM_SHA384
            - TLS_AES_128_GCM_SHA256
            - TLS_CHACHA20_POLY1305_SHA256
            - TLS_FALLBACK_SCSV
          curvePreferences:
            - CurveP521
            - CurveP384
          sniStrict: false
      - apiVersion: traefik.io/v1alpha1
        kind: TLSStore
        metadata:
          name: default
          namespace: kube-system
        spec:
          defaultCertificate:
            secretName: ${CLUSTER_TLS_SECRET}
