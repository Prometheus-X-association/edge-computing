      #  kind: Secret
      #  metadata:
      #    name: dashboard-auth-secret
      #  type: Opaque
      #  data:
      #    users: ${TRAEFIK_DASHBOARD_CREDS}
      #- apiVersion: traefik.io/v1alpha1
