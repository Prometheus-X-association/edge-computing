apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${CONTROLLER}
  namespace: ${PTX}
  labels:
    app: ${CONTROLLER}
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ${CONTROLLER}-rbac-cluster
rules:
  - apiGroups: [ kopf.dev ]
    resources: [ clusterkopfpeerings ]
    verbs: [ list, watch, patch, get ]
  - apiGroups: [ apiextensions.k8s.io ]
    resources: [ customresourcedefinitions ]
    verbs: [ list, watch ]
  - apiGroups: [ "" ]
    resources: [ namespaces ]
    verbs: [ list, watch ]
  - apiGroups: [ admissionregistration.k8s.io/v1, admissionregistration.k8s.io/v1beta1 ]
    resources: [ validatingwebhookconfigurations, mutatingwebhookconfigurations ]
    verbs: [ create, patch ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${CONTROLLER}-rbac
  namespace: ${PTX}
rules:
  - apiGroups: [ kopf.dev ]
    resources: [ kopfpeerings ]
    verbs: [ list, watch, patch, get ]
  - apiGroups: [ "" ]
    resources: [ events ]
    verbs: [ create ]
  - apiGroups: [ dataspace.ptx.org ]
    resources: [ edgeworkertasks, edgeworkertasks/status ]
    verbs: [ list, watch, patch ]
  - apiGroups: [ batch, extensions ]
    resources: [ jobs ]
    verbs: [ create ]
  - apiGroups: [ "" ]
    resources: [ pods, persistentvolumeclaims ]
    verbs: [ create ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ${CONTROLLER}-rbac-cluster
  namespace: ${PTX}
subjects:
  - kind: ServiceAccount
    name: ${CONTROLLER}
    namespace: ${PTX}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ${CONTROLLER}-rbac-cluster
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${CONTROLLER}-rbac
  namespace: ${PTX}
subjects:
  - kind: ServiceAccount
    name: ${CONTROLLER}
    namespace: ${PTX}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${CONTROLLER}-rbac
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${CONTROLLER}
  namespace: ${PTX}
  labels:
    app.kubernetes.io/name: ${CONTROLLER}
    env: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ${CONTROLLER}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ${CONTROLLER}
        env: demo
    spec:
      serviceAccountName: ${CONTROLLER}
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      containers:
        - name: ${CONTROLLER}
          image: ${REGISTRY}:${REGISTRY_PORT}/${CONTROL_IMG}
          imagePullPolicy: IfNotPresent
          command: [ "kopf", "run",  "--namespace=${PTX}", "--verbose", "--standalone", "app/controller.py" ]
      restartPolicy: Always
---